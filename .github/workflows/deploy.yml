name: Deploy Backend to AWS

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      registry_url: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: record-store-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY_URL: ${{ needs.build-and-push.outputs.registry_url }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: REGISTRY_URL
          script: |
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=eu-west-1

            aws ecr get-login-password --region eu-west-1 | sudo docker login --username AWS --password-stdin $REGISTRY_URL

            sudo docker pull $REGISTRY_URL/record-store-backend:latest
            sudo docker stop music-api || true
            sudo docker rm music-api || true

            sudo docker run -d --name music-api \
              -p 80:8000 \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              --restart always $REGISTRY_URL/record-store-backend:latest

            ACTION=$(sudo docker exec music-api python3 -c "
            import os, sqlalchemy
            from sqlalchemy import inspect
            u, p, h, pt, db = os.getenv('DB_USER'), os.getenv('DB_PASSWORD'), os.getenv('DB_HOST'), os.getenv('DB_PORT'), os.getenv('DB_NAME')
            url = f'mysql+pymysql://{u}:{p}@{h}:{pt}/{db}'
            try:
                engine = sqlalchemy.create_engine(url)
                tables = inspect(engine).get_table_names()
                if 'alembic_version' in tables:
                    print('UPGRADE')
                elif 'users' in tables or 'records' in tables:
                    print('STAMP')
                else:
                    print('FRESH')
            except Exception as e:
                print('UPGRADE')
            " | xargs)

            echo "Detected Database State: $ACTION"

            if [ "$ACTION" == "STAMP" ]; then
                echo "Tables exist without history. Synchronizing Alembic..."
                sudo docker exec music-api alembic stamp head
            elif [ "$ACTION" == "FRESH" ]; then
                echo "Fresh database detected. Creating schema..."
                sudo docker exec music-api alembic upgrade head
            else
                echo "Standard deployment. Applying incremental migrations..."
                sudo docker exec music-api alembic upgrade head
            fi